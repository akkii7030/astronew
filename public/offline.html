<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0f1b3d" />
  <title>Offline — Om Astro</title>
  <link rel="icon" href="/icons/icon-192.png" />
  <style>
    :root { color-scheme: dark; }
    html,body { margin:0; padding:0; min-height:100%; background:#0f1b3d; color:#f5f0e0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    main { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
    img { width:88px; height:88px; border-radius:20px; margin-bottom:20px; box-shadow:0 12px 40px rgba(0,0,0,.4); }
    h1 { font-size:24px; margin:0 0 8px; font-weight:600; }
    p { margin:0 0 24px; color:#c9b99a; max-width:340px; line-height:1.5; }
    button { background:#c9a84c; color:#0f1b3d; border:0; padding:12px 22px; border-radius:999px; font-weight:600; font-size:14px; cursor:pointer; }
    button:hover { filter:brightness(1.05); }
  </style>
</head>
<body>
  <main>
    <img src="/icons/icon-192.png" alt="Om Astro" />
    <h1>You're offline</h1>
    <p>It looks like you've lost connection. Check your internet and try again — your consultations will be right here when you're back.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
